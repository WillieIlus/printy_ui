server {
    listen 80;
    server_name printy.ke www.printy.ke;

    # Public crawler files should always be reachable at the root URL.
    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000/robots.txt;
        include proxy_params;
        access_log off;
        log_not_found off;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3000/sitemap.xml;
        include proxy_params;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        include proxy_params;
    }
}
