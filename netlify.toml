[build]
  command = "yarn run build"
  publish = "dist"

[build.environment]
  NUXT_PUBLIC_API_BASE_URL = "https://api.printy.ke"
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "https://api.printy.ke/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/media/*"
  to = "https://api.printy.ke/media/:splat"
  status = 200
  force = true
